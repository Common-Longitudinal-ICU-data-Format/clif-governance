# Quorum settings
quorum:
  type: "majority"  # Options: majority, two-thirds, fixed
  threshold: 0.5    # >50% for majority
  
# Voting thresholds by motion type
voting_thresholds:
  standard: 0.5           # Simple majority
  schema_change: 0.67     # 2/3 for breaking changes
  mcide_update: 0.5       # Simple majority
  new_table: 0.67         # 2/3 for new tables
  policy: 0.5             # Simple majority
